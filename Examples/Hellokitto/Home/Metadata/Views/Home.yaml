DisplayLabel: %Config:AppTitle% %APP_VERSION%
Controller: BorderPanel
  DisplayMode: FullScreen
  WestView:
    DisplayLabel: _(Main Menu)
    Controller: BorderPanel
      Width: 230
      Collapsible: True
      Border: True
      Split: True
      Header: True
      NorthView:
        Controller: HtmlPanel
          Split: False
          Html: <center><p><img src="%IMAGE(hello_kitto_150)%" width="150" height="47"></img></p></center>
      CenterView:
        Controller: TreePanel
          TreeView: MainMenu
      # User-selectable theme switcher at the bottom of the left menu panel
      # (Light / Auto / Dark). Renders only when Theme: Auto /
      # UserSelection: True; otherwise the band collapses.
      SouthView:
        Height: 44
        Controller: ThemeSwitcher

  CenterView:
    Controller: TabPanel
      Border: True
      SubViews:
        View: Girls
        View: Dolls
        View: DollsCard

  NorthView:
    Controller: ToolBar
      TreeView: MainMenu

  # Status bar as a full-width bottom band (moved here from the menu's south
  # so the menu south can host the theme switcher, matching TasKitto).
  SouthView:
    Controller: StatusBar
      Text: |
        <center>Connected to: <b>%Config:DefaultDatabaseName%</b></center>
        <center>_(User: %Auth:UserName%)</center>
      ImageName: person
