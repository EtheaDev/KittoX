AppName: HelloKittoX
AppTitle: _(Peoria Girls and their Dolls)
AppIcon: HelloKittoIcon
# Default is the application name in lower case.
AppPath: /hellokittox
BlobPath: %HOME_PATH%UploadedFiles\

# Change this to switch databases.
#DefaultDatabaseName: DBExpress_Firebird
#DefaultDatabaseName: DBExpress_MSSQL
DefaultDatabaseName: FireDAC_MSSQL
#DefaultDatabaseName: FireDAC_Firebird
#DefaultDatabaseName: FireDAC_PostgreSQL
#DefaultDatabaseName: FireDAC_Oracle
#DefaultDatabaseName: ODAC_Oracle
#DefaultDatabaseName: ADO_MSSQL

Databases:
  DBExpress_Firebird: DBX
    Connection:
      DriverName: Firebird
      Database: localhost:HelloKitto
      User_Name: SYSDBA
      Password: masterkey
      ServerCharSet: UTF8
      WaitOnLocks: True
      IsolationLevel: ReadCommitted
      Trim Char: False

  DBExpress_MSSQL: DBX
    Connection:
      DriverName: MSSQL
      HostName: localhost
      DataBase: HelloKitto
      OS Authentication: True

  FireDAC_MSSQL: FD
    Connection:
      DriverID: MSSQL
      Server: 127.0.0.1, 1433
      ApplicationName: %APPTITLE%
      Database: HelloKitto
      OSAuthent: No
      User_Name: SA
      Password: 12345
      Isolation: RepeatableRead
      ODBCAdvanced: TrustServerCertificate=yes

  FireDAC_Firebird: FD
    Connection:
      DriverID: FB
      # Alias of database defined in Aliases.conf
      Database: HELLOKITTO
      User_Name: SYSDBA
      Password: masterkey
      Server: localhost
      CharacterSet: UTF8
      Protocol: TCPIP

  FireDAC_PostgreSQL: FD
    Connection:
      DriverID: PG
      Server: localhost
      Port: 5432
      Database: hellokitto
      User_Name: kittox_admin
      Password: kittox_admin_2026!
      CharacterSet: UTF8
      # Schema sets PostgreSQL search_path so unqualified table names resolve to this schema
      Schema: hellokitto
      ApplicationName: %APPTITLE%
      POOL_MaximumItems: 50

  FireDAC_Oracle: FD
    Connection:
      DriverID: Ora
      # EZ Connect string: host:port/service_name. Oracle XE 21c PDB = xepdb1.
      # The XE listener is configured (listener.ora HOST=0.0.0.0) to listen on
      # all interfaces, so localhost/127.0.0.1 works too.
      Database: localhost:1521/xepdb1
      User_Name: HELLOKITTO
      Password: 12345
      # Full Unicode client charset.
      CharacterSet: AL32UTF8
      # Oracle has no native boolean: map booleans to NUMBER(1) (0/1).
      BooleanFormat: Integer
      # Default schema for FireDAC metadata lookups (matches the connecting user).
      MetaDefSchema: HELLOKITTO
      ApplicationName: %APPTITLE%
      POOL_MaximumItems: 50

  # Oracle via Devart ODAC (alternative to FireDAC_Oracle, for sites that own
  # an ODAC license). Kept commented out because ODAC is a third-party
  # commercial library: to enable it, uncomment this block AND uncomment
  # EF.DB.ODAC in Source\UseKitto.pas (plus add the ODAC library path to the
  # project). FireDAC_Oracle above stays available for everyone without ODAC.
  # ODAC: https://www.devart.com/odac/
  ODAC_Oracle: ODAC
    Connection:
      # EZ Connect string: host:port/service_name. Oracle XE 21c PDB = xepdb1.
      Server: localhost:1521/xepdb1
      User_Name: HELLOKITTO
      Password: 12345
      # Direct Oracle Net mode: no locally installed Oracle client needed
      # (requires ODAC Professional). Set to False to connect through OCI.
      Direct: True
      # Full Unicode client charset.
      Charset: AL32UTF8
      # ConnectMode: Normal (default), SysDBA or SysOper.
      ConnectMode: Normal
      # Optional ALTER SESSION SET CURRENT_SCHEMA on connect.
      Schema: HELLOKITTO

  ADO_MSSQL: ADO
    Connection:
      # This doesn't work because of a bug with date and time fields in ADO/OLEDB.
      # See http://qc.embarcadero.com/wc/qcmain.aspx?d=78910
      #Provider: SQLOLEDB.1
      # Using the Native client fixes the date bug but still not the time bug.
      Provider: SQLNCLI10
      Trusted_Connection: Yes
      Initial Catalog: HelloKitto
      Data Source: %COMPUTERNAME%

Auth: JWT
  # Inner authenticator: the actual credential check stays delegated to the
  # standard DB authenticator (registered by Kitto.Auth.DB). TKJWTAuthenticator
  # wraps it: on successful Authenticate, builds and signs a JWT, sets it in
  # the kx_token HttpOnly cookie, and reads/validates it on every subsequent
  # request via the auth gate in TKWebApplication.DoHandleRequest.
  # No DatabaseChoices is set, so the login page does NOT show the environment
  # combo — the active dialect is whatever DefaultDatabaseName resolves to.
  Inner: DB
    IsPassepartoutEnabled: True
    PassepartoutPassword: password
    IsClearPassword: False
    .Defaults:
      UserName: administrator
      Password: password

  # JWT envelope settings.
  # SigningAlgorithm: HS256/HS384/HS512 (HMAC, no OpenSSL DLL required from
  # Delphi 10 Seattle onward) or RS256/RS384/RS512/ES256/ES384/ES512 (asymmetric,
  # require OpenSSL libraries to be deployed alongside the binary).
  SigningAlgorithm: HS256
  # SigningKey accepts:
  #   env:VAR_NAME    read from environment variable (recommended for prod)
  #   file:/path      read raw bytes from a file (PEM for RS*/ES*)
  #   inline literal  any other value, used as the raw key (DEV ONLY)
  # The HelloKittoX demo overrides this via TKJWTSigningKeyRegistry in
  # UseKitto.pas — the registered provider always takes precedence over
  # this YAML setting. The env var fallback is kept here so that removing
  # the provider from UseKitto.pas keeps the app running without code
  # changes (just set KX_JWT_KEY_HELLOKITTO).
  SigningKey: env:KX_JWT_KEY_HELLOKITTO
  # iss/aud claims — verified on every request validation.
  Issuer: HelloKittoX
  Audience: kx-app
  # exp claim relative to issue time, in seconds.
  TokenLifetime: 3600
  # When (exp - now) drops below SlidingThreshold seconds, the auth gate
  # re-issues the cookie with a fresh exp. Set to 0 to disable sliding.
  SlidingThreshold: 600
  # Allowance (seconds) for clock skew between client and server during
  # exp/nbf/iat validation.
  ClockSkew: 60
  Claims:
    IncludeRoles: False
    IncludeDB: True
    IncludeDisplayName: True
    IncludeLanguage: True
    # The kx_acl claim is included automatically only when AccessControl
    # below is set to JWT. HelloKitto uses AccessControl: Null so the
    # claim is omitted by the framework.

AccessControl: Null

LanguagePerSession: True

Login:
  Controller:
    Title: Login to "HelloKitto" %APP_VERSION_FULL%
    BorderPanel:
      NorthView:
        Controller: HtmlPanel
          Height: 80
          Html: |
            <div style="text-align: center">
              <p/>
              <p><img src="%IMAGE(hello_kitto_150)%"></img></p>
              <p/>
            </div>
      # User-selectable theme switcher under the form (Light / Auto / Dark).
      # Renders only when Theme: Auto / UserSelection: True; otherwise no-op.
      SouthView:
        Controller: ThemeSwitcher
    LabelWidth: 150
    EditWidth: 200
    ExtraHeight: 100
    ExtraWidth: 350
    LocalStorage:
      Mode: Password
      AskUser: True
        .Default: False
      AutoLogin: False

HomeView: Home
#HomeView: HomeTiny
#HomeView: HomeSmall

Theme:
  Mode: Auto
  UserSelection: True
  Font-Family: Comic Sans MS
  Font-Size: 12px
  IconStyle: filled
  Light:
    Primary-Color: FireBrick
  Dark:
    Primary-Color: Gold

AjaxTimeout: 100000

# No language Id specified means try to use the language requested by the browser.
LanguageId: en
LanguagePerSession: True
# Either utf-8 or a SBCS corresponding to the system code page
# (such as iso-8859-1 for Western Europe). Defaults to utf-8.
Charset: utf-8
UserFormats:
  Date: dd/mm/yyyy
  Time: hh:nn
  Currency: €
  Decimal: ,
  Thousand: .

Log:
  # low, medium, high, detailed, debug
  Level: detailed
  TextFile:
    FileName: %APP_PATH%.log
    # Set this to false to disable this logger without deleting its configuration.
    IsEnabled: True
  Console:
    IsEnabled: True

Server:
  Port: 3621
  # default 20
  ThreadPoolSize: 15

Engine:
  Session:
    # Minutes after which an inactive session is cleaned up. Defaults to 10.
    TimeOut: 10
    # Seconds after wich the cleanup of inactive sessions kicks in. Defaults to 30.
    CleanupInterval: 30