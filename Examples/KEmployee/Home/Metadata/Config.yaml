AppName: KEmployeeX
AppTitle: Employee demo
AppIcon: FireBirdSql_120
# Default is the application name in lower case.
AppPath: /kemployeex
Application:
  # When using partial proxy mode (serving /hellokitto/res/ from a separate web server)
  # you can set this to False to gain some speed. Default is True.
  #HandleResources: False

# Defaults for entire application
Defaults:
  Grid:
    PageRecordCount: 100
    DefaultAction: Edit
  FormPanel:
    HideLabels: False
  Window:
    Width: 900
    Height: 500
  Layout:
    MemoWidth: 70
    MaxFieldWidth: 70
    MinFieldWidth: 6

Databases:
  Main: FD
    Connection:
      # Example for FireDAC
      DriverID: FB
      Database: EMPLOYEE
      User_Name: SYSDBA
      Password: masterkey
      Server: localhost
      #CharacterSet: UTF8
      Protocol: TCPIP

  DBExpress: DBX
    Connection:
      # Example for DbExpress
      DriverName: Firebird
      DataBase: localhost:EMPLOYEE
      User_Name: SYSDBA
      Password: masterkey
      #ServerCharSet: UTF8
      WaitOnLocks: True
      IsolationLevel: ReadCommitted
      Trim Char: False

Auth: JWT
  # Inner authenticator: the actual credential check stays delegated to the
  # TextFile authenticator (registered by Kitto.Auth.TextFile), which reads
  # the user list from FileAuthenticator.txt in Home/. TKJWTAuthenticator
  # wraps it: on successful Authenticate, builds and signs a JWT, sets it in
  # the kx_token HttpOnly cookie, and reads/validates it on every subsequent
  # request via the auth gate in TKWebApplication.DoHandleRequest.
  Inner: TextFile
    IsPassepartoutEnabled: True
    PassepartoutPassword: password
    IsClearPassword: True
    Defaults:
      UserName: guest
      .Password: password

  # JWT envelope settings.
  # SigningAlgorithm: HS256/HS384/HS512 (HMAC, no OpenSSL DLL required from
  # Delphi 10 Seattle onward) or RS256/RS384/RS512/ES256/ES384/ES512 (asymmetric,
  # require OpenSSL libraries to be deployed alongside the binary).
  SigningAlgorithm: HS256
  # SigningKey accepts:
  #   env:VAR_NAME    read from environment variable (recommended for prod)
  #   file:/path      read raw bytes from a file (PEM for RS*/ES*)
  #   inline literal  any other value, used as the raw key (DEV ONLY)
  # The KEmployeeX demo overrides this via TKJWTSigningKeyRegistry in
  # UseKitto.pas — the registered provider always takes precedence over
  # this YAML setting. The env var fallback is kept here so that removing
  # the provider from UseKitto.pas keeps the app running without code
  # changes (just set KX_JWT_KEY_KEMPLOYEE).
  SigningKey: env:KX_JWT_KEY_KEMPLOYEE
  # iss/aud claims — verified on every request validation.
  Issuer: KEmployeeX
  Audience: kx-app
  # exp claim relative to issue time, in seconds.
  TokenLifetime: 3600
  # When (exp - now) drops below SlidingThreshold seconds, the auth gate
  # re-issues the cookie with a fresh exp. Set to 0 to disable sliding.
  SlidingThreshold: 600
  # Allowance (seconds) for clock skew between client and server during
  # exp/nbf/iat validation.
  ClockSkew: 60
  Claims:
    IncludeRoles: False
    # IncludeDB left False because KEmployee uses a single Main database.
    IncludeDB: False
    IncludeDisplayName: True
    IncludeLanguage: True
    # The kx_acl claim is included automatically only when AccessControl
    # below is set to JWT. KEmployee uses AccessControl: Null so the
    # claim is omitted by the framework.

AccessControl: Null

Login:
  Controller:
    Title: %Config:AppTitle% %APP_VERSION_FULL%
    BorderPanel:
      NorthView:
        Controller: HtmlPanel
          Height: 120
          Html: |
            <div style="text-align: center">
              <p/>
              <p><img src="%IMAGE(Firebird_Employee)%"></img></p>
              <p><H1>Firebird Employee Demo</H1></p>
              <p/>
            </div>
    ExtraWidth: 400
    LabelWidth: 150
    ExtraHeight: 210
    LocalStorage:
      Mode: Password
      AskUser: True
        .Default: False

# Change this to use a custom view for the home page.
# Alternatively, customize the Home view by replacing its controller.
# Default: Home.
#HomeView: Home

#Theme: Auto
Theme: Light
  IconStyle: outlined
#Theme: Dark

AjaxTimeout: 100000

# No language Id specified means try to use the language requested by the browser.
LanguageId: en
LanguagePerSession: True
# Either utf-8 or a SBCS corresponding to the system code page
# (such as iso-8859-1 for Western Europe). Defaults to utf-8.
Charset: utf-8
UserFormats:
  Date: mm/dd/yyyy
  Time: hh:nn

Log:
  # low, medium, high, detailed, debug
  Level: detailed
  TextFile:
    FileName: %APP_PATH%log.txt
    # Set this to false to disable this logger without deleting its configuration.
    IsEnabled: True

Server:
  Port: 3623
  # default 20
  ThreadPoolSize: 15

Engine:
  Session:
    # Minutes after which an inactive session is cleaned up. Defaults to 10.
    TimeOut: 10
    # Seconds after wich the cleanup of inactive sessions kicks in. Defaults to 30.
    CleanupInterval: 30
