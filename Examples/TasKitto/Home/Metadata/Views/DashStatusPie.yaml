Type: Data
DisplayLabel: _(Activities by Status)
Controller: List
  CenterController: ChartPanel
    Chart:
      Type: Cartesian
      Theme: Muted
      Axes:
        Axis:
          Position: Left
          Title: _(Count)
        Axis:
          Type: Category
          Position: Bottom
      Series:
        Series:
          Type: Bar
          XField: STATUS
          YField: ACTIVITY_COUNT
          DisplayName: _(Activities)
          Highlight:
            StrokeStyle: black
            FillStyle: gold
          Label:
            Field: ACTIVITY_COUNT
            Display: insideEnd
MainTable:
  IsReadOnly: True
  Model: ACTIVITY_BY_STATUS
ImageName: bar_chart
