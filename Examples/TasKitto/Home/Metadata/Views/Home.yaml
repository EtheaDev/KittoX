#DisplayLabel: %Config:AppTitle%
Controller: BorderPanel
  DisplayMode: FullScreen
  WestView:
    DisplayLabel: _(Main Menu)
    Controller: BorderPanel
      Width: 230
      Collapsible: True
      Border: True
      Split: True
      Header: True
      NorthView:
        Controller: HtmlPanel
          Split: False
          Html: |
            <center>
              <p><img src="%IMAGE(taskitto_logo_150)%"></img></p>
              <p><b>An activity tracking application.</b></p>
            </center>
          Height: 100
      CenterView:
        Controller: TreePanel
          TreeView: MainMenu

  CenterController: TabPanel
    Border: True
    # List of views to be auto-opened in tabs.
    SubViews:
      View: Dashboard
      View: ActivityInput
      View: Customers
      View: Projects
      View: ActivityBarChart
      View: ActivityPieChart

  .NorthController: HtmlPanel
    Split: False
    Html: |
      <center>
        <img src="%IMAGE(taskitto_logo_150)%"></img>
        <h4>An example activity tracking application.</h4>
      </center>
    Height: 100

  SouthView:
    ImageName: person
    Controller: StatusBar
          Text: Environment: %Auth:Environment% - user: %Auth:USER_NAME% - %Auth:FIRST_NAME% %Auth:LAST_NAME%
