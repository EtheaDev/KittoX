AppName: TaskittoX
AppTitle: Tasks & Activities

# Default is the application name in lower case.
AppPath: /taskittox

EmailSupport: <support@kitto.org>
Email:
  SMTP:
    Default:
      HostName: abc.it
      UserName: qwerty@abc.com
      Password: qwerty
      Port: 100
      UseTLS: True

# Defaults for entire application
Defaults:
  Grid:
    PageRecordCount: 50
    DefaultAction: Edit
  FormPanel:
    HideLabels: False
  Window:
    Width: 800
    Height: 600
  Layout:
    MemoWidth: 70
    MaxFieldWidth: 70
    MinFieldWidth: 6
    RequiredLabelTemplate: <i>{label}*</i>
    # Default/Layout/LabelSeparator empty if you want to hide the default LabelSeparator (:)
    LabelSeparator:

# Change this to switch databases.
DefaultDatabaseName: FireDAC_MSSQL
#DefaultDatabaseName: FireDAC_Firebird
#DefaultDatabaseName: FireDAC_PostgreSQL

Databases:
  FireDAC_MSSQL: FD
    DisplayLabel: Database SQL Server
    Connection:
      DriverID: MSSQL
      Server: 127.0.0.1, 1433
      ApplicationName: %APPTITLE%
      Database: Taskitto
      OSAuthent: No
      User_Name: SA
      Password: 12345
      Isolation: ReadCommitted
      ODBCAdvanced: TrustServerCertificate=yes
      POOL_MaximumItems: 50

  FireDAC_Firebird: FD
    DisplayLabel: Database Firebird
    Connection:
      DriverID: FB
      # Alias of database defined in Aliases.conf
      Database: TASKITTO
      User_Name: SYSDBA
      Password: masterkey
      Server: localhost
      CharacterSet: UTF8
      Protocol: TCPIP
      POOL_MaximumItems: 50

  FireDAC_PostgreSQL: FD
    DisplayLabel: Database PostgreSQL
    Connection:
      DriverID: PG
      Server: localhost
      Port: 5432
      Database: taskitto
      User_Name: kittox_admin
      Password: kittox_admin_2026!
      CharacterSet: UTF8
      Schema: taskitto
      ApplicationName: %APPTITLE%
      POOL_MaximumItems: 50

Auth: JWT
  # Inner authenticator: the actual credential check stays delegated to the
  # TasKitto custom DB authenticator (registered by Auth.pas). TKJWTAuthenticator
  # wraps it: on successful Authenticate, builds and signs a JWT, sets it in
  # the kx_token HttpOnly cookie, and reads/validates it on every subsequent
  # request via the auth gate in TKWebApplication.DoHandleRequest.
  Inner: TasKitto
    IsPassepartoutEnabled: True
    PassepartoutPassword: password
    IsClearPassword: True
    # Show an "Environment" combo before UserName on the login page so users can
    # pick which database to connect to. Comma-separated list of database names
    # defined under the Databases node above. The chosen value is exposed as
    # %Auth:DatabaseName% AND embedded in the JWT 'db' claim, replacing the
    # legacy kx_db cookie.
    DatabaseChoices: FireDAC_MSSQL, FireDAC_PostgreSQL, FireDAC_Firebird
    .Defaults:
      UserName: administrator
      Password: password
    ReadUserCommandText: |
      select USER_NAME, PASSWORD_HASH, EMAIL_ADDRESS, MUST_CHANGE_PASSWORD, FIRST_NAME, LAST_NAME
      from KITTO_USERS
      where IS_ACTIVE = %DB.TRUE% and UPPER(USER_NAME) = UPPER(:USER_NAME)
    ValidatePassword:
      Message: Min 8 with upper+lower+number+special chars
      RegEx: ^(?=.*\d)(?=.*[A-Z])(?=.*[a-z])(?=.*[^\w\d\s:])([^\s]){8,16}$
    ResetMailMessage:
      From: <support@kitto.org>
      Subject: Reset password required from %Config:AppTitle%
      Body: |
        Hello #UserName#.
        You have requested a password reset.
        The new temporary password you need to use the next time you log in is #TempPassword#.
        Best regards.

        The team of %Config:AppTitle%
      HTMLBody: |
        <p>Hello <b>#UserName#</b>.<br>
        <p>You have requested a password reset.<br>
        The new temporary password you need to use the next time you log in is <b>#TempPassword#</b>.<br>
        Best regards.</p>
        </p>
        <p>The team of <b>%Config:AppTitle%</b><p>
    NewUserMailMessage:
      From: <support@kitto.org>
      Subject: New user registration from %Config:AppTitle%
      Body: |
        Welcome #UserName#.
        You have created a new user.
        The new temporary password you need on your first log in is #TempPassword#.
        Best regards.

        The team of %Config:AppTitle%
      HTMLBody: |
        <p>Welcome <b>#UserName#</b>.<br>
        <p>You have created a new user.<br>
        The new temporary password you need on your first log in is <b>#TempPassword#</b>.<br>
        Best regards.</p>
        </p>
        <p>The team of <b>%Config:AppTitle%</b><p>

  # JWT envelope settings.
  # SigningAlgorithm: HS256/HS384/HS512 (HMAC, no OpenSSL DLL required from
  # Delphi 10 Seattle onward) or RS256/RS384/RS512/ES256/ES384/ES512 (asymmetric,
  # require OpenSSL libraries to be deployed alongside the binary).
  SigningAlgorithm: HS256
  # SigningKey accepts:
  #   env:VAR_NAME    read from environment variable (recommended for prod)
  #   file:/path      read raw bytes from a file (PEM for RS*/ES*)
  #   inline literal  any other value, used as the raw key (DEV ONLY)
  # The TaskittoX demo overrides this via TKJWTSigningKeyRegistry in
  # UseKitto.pas — the registered provider always takes precedence over
  # this YAML setting. The env var fallback is kept here so that removing
  # the provider from UseKitto.pas keeps the app running without code
  # changes (just set KX_JWT_KEY_TASKITTO).
  SigningKey: env:KX_JWT_KEY_TASKITTO
  # iss/aud claims — verified on every request validation.
  Issuer: TaskittoX
  Audience: kx-app
  # exp claim relative to issue time, in seconds.
  TokenLifetime: 3600
  # When (exp - now) drops below SlidingThreshold seconds, the auth gate
  # re-issues the cookie with a fresh exp. Set to 0 to disable sliding.
  SlidingThreshold: 600
  # Allowance (seconds) for clock skew between client and server during
  # exp/nbf/iat validation.
  ClockSkew: 60
  # Optional claim selection — only matters for downstream consumers that
  # look at the embedded user profile.
  Claims:
    IncludeRoles: True
    IncludeDB: True
    IncludeDisplayName: True
    IncludeLanguage: True
    # When True, TKJWTAuthenticator queries KITTO_PERMISSIONS + KITTO_USER_ROLES
    # at login (using the SQL templates from AccessControl below) and embeds
    # the user's grant rows into the kx_acl claim. TKJWTAccessController then
    # evaluates IsAccessGranted against this snapshot without re-hitting the
    # DB on every request. Trade-off: changes to the underlying tables are
    # not reflected until the user logs in again.
    IncludeACL: True


AccessControl: JWT
  # When True (default), if the kx_acl claim does not cover a specific
  # resource/mode, the controller falls back to a TKDBAccessController so the
  # database remains the source of truth for grants the JWT did not snapshot.
  # Set to False to enforce a closed-world model (anything missing from the
  # claim is denied) — useful if the token must be the only authoritative source.
  FallbackToDB: True

Login: LoginView

# to use GoogleMap you must acquire an Api Key for your applications.
GoogleMapsApiKey: XYZ

HomeView: Home

#Theme: Auto
  Font-Size: 12px
  IconStyle: two-tone
.Theme: Light
  Primary-Color: Green
  Font-Size: 12px
  IconStyle: two-tone
  IconSize: small
Theme: Dark
  #Primary-Color: White
  Font-Size: 12px
  IconStyle: two-tone
  IconSize: medium

AjaxTimeout: 100000

# No language Id specified means try to use the language requested by the browser.
LanguageId: en
LanguagePerSession: True
# Either utf-8 or a SBCS corresponding to the system code page
# (such as iso-8859-1 for Western Europe). Defaults to utf-8.
Charset: utf-8

FOPEnginePath: %FOP1_1%

UserFormats:
  Date: dd/mm/yyyy
  Time: hh:nn
  Currency: €
  Decimal: ,
  Thousand: .

Log:
  TextFile:
    FileName: %APP_PATH%log.txt
    # Set this to false to disable this logger without deleting its configuration.
    IsEnabled: True
  Console:
    IsEnabled: True

Server:
  Port: 3622
  # default 20
  ThreadPoolSize: 15

Engine:
  Session:
    # Minutes after which an inactive session is cleaned up. Defaults to 10.
    TimeOut: 10
    # Seconds after wich the cleanup of inactive sessions kicks in. Defaults to 30.
    CleanupInterval: 30
