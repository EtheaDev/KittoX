AppTitle: {AppTitle}

# Default database connection name. ProcessConfigTemplate fills `Databases`
# with `Main: <FD/DBX/ADO>` based on which drivers are enabled.
DefaultDatabaseName: Main

Databases:

Auth: Null

AccessControl: Null

# Theme. Options: Mode = Light | Dark | Auto.
# IconStyle = filled | outlined | round | sharp | two-tone.
# IconSize = Small | Medium | Large.
Theme:
  Mode: Auto
  IconStyle: outlined
  IconSize: Medium

# Default UI language. The runtime can switch language per session via
# the Accept-Language header or the kx_lang cookie.
LanguageId: en

# Either utf-8 or a SBCS corresponding to the system code page
# (such as iso-8859-1 for Western Europe). Defaults to utf-8.
Charset: utf-8

# AJAX timeout in seconds for HTMX and fetch channels. Applies to long
# requests (e.g. heavy queries, exports). Default: 30.
AjaxTimeout: 30

# Initial UI: Home view + main menu. The Basic template ships a minimal
# tree menu containing Logout and ChangePassword (under Views/MainMenu).
# Add views auto-generated from your Models with `kx menu_generate_main_menu`
# (MCP-KittoX) or by hand in Views/MainMenu.yaml.
HomeView: Home

Server:
  Port: 8080
  ThreadPoolSize: 20
  # In minutes.
  SessionTimeOut: 10
