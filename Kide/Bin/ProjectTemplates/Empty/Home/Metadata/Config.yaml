AppTitle: {AppTitle}

# Default database connection name. Empty until a Databases entry is added.
DefaultDatabaseName:

Databases:

Auth: Null

AccessControl: Null

# Theme. Mode = Auto (follow OS) | Light | Dark.
# IconStyle = filled | outlined | round | sharp | two-tone.
# IconSize = Small | Medium | Large.
# UserSelection: True shows a ThemeSwitcher (only when Mode=Auto); the choice
# is persisted per-app in the browser localStorage.
# Add Light:/Dark: sub-nodes with a Primary-Color to colour each mode; with no
# Primary-Color the framework's neutral slate palette is used.
Theme:
  Mode: Auto
  UserSelection: True
  IconStyle: outlined
  IconSize: Medium
  #Light:
  #  Primary-Color: SteelBlue
  #Dark:
  #  Primary-Color: SteelBlue

# Default UI language. The runtime can switch language per session via
# the Accept-Language header or the kx_lang cookie.
LanguageId: en

# Either utf-8 or a SBCS corresponding to the system code page
# (such as iso-8859-1 for Western Europe). Defaults to utf-8.
Charset: utf-8

# AJAX timeout in milliseconds for HTMX and fetch channels (passed verbatim
# to htmx.config.timeout and to the fetch wrapper in kxgrid.js). Applies to
# long requests (e.g. heavy queries, exports). Default: 100000 (100 s).
AjaxTimeout: 100000

Server:
  Port: 8080
  ThreadPoolSize: 20
  # In minutes.
  SessionTimeOut: 10
